name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Run Codex Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIFF=$(cat pr_diff.txt | head -c 8000)
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n \
              --arg diff "$DIFF" \
              '{
                model: "o4-mini",
                messages: [
                  {
                    role: "system",
                    content: "You are an expert code reviewer. Review the following git diff and provide constructive feedback in Japanese. Focus on: bugs, security issues, performance, readability, and best practices. Be concise and actionable."
                  },
                  {
                    role: "user",
                    content: ("Please review this pull request diff:\n\n" + $diff)
                  }
                ]
              }'
            )")
          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "レビューの取得に失敗しました。"')
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🤖 Codex Code Review\n\n${{ steps.review.outputs.comment }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
